<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwd Gen</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/x-icon" href="https://avatars.githubusercontent.com/u/73515621?s=400&u=f200710de623535d988de299b9c7fc9487cc168e&v=4">
</head>
<body>
    <h1><span class="titleStyling">Passw</span>or<span class="titleStyling">d</span> <span class="titleStyling">Gen</span>erator</h1>
    <h3 id="passwdPara"></h3>
    <br>
    <label for="lengthBox">Enter the length of Password: </label>
    <input type="number" id="lengthBox" value="8" min="1"><br>
    <button id="genBtn" onclick="passwdGen()">Generate</button>
    <br><br>
    <input type="checkbox" id="includeUppercase-check" checked>
    <label for="includeUppercase-check">includeUppercaseCharacters</label><br>
    <input type="checkbox" id="includeLowercase-check" checked>
    <label for="includeLowercase-check">includeLowercaseCharacters</label><br>
    <input type="checkbox" id="includeSymbols-check" checked>
    <label for="includeSymbols-check">includeSymbolCharacters</label><br>
    <input type="checkbox" id="includeNumbers-check" checked>
    <label for="includeNumbers-check">includeNumericCharacters</label>

    <script src="./index.js"></script>
</body>
</html>
